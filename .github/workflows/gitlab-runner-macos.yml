name: GitLab Runner macOS

on:
  workflow_dispatch:

jobs:
  macos-runner:
    runs-on: macos-15
    timeout-minutes: 360
    env:
      GITLAB_URL: ${{ vars.GITLAB_URL }}
      GITLAB_RUNNER_TOKEN: ${{ secrets.GITLAB_RUNNER_TOKEN_MACOS }}
      LOG_LEVEL: warn
      RUNNER_TAGS: saas-macos-medium-m1
      RUNNER_USERNAME: ${{ vars.RUNNER_USERNAME }}
      RUNNER_PASSWORD: ${{ secrets.RUNNER_PASSWORD }}
      RUNNER_CONFIG: /tmp/gitlab-runner-macos/config.toml
      RUNNER_WORKDIR: /tmp/gitlab-runner-macos/work

    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-runner
          hostname: gh-mac-${{ github.run_id }}

      - name: Configure SSH and X11 VNC
        run: |
          set -euo pipefail
          if [ -z "${RUNNER_PASSWORD}" ]; then
            echo "::error::Missing secret RUNNER_PASSWORD"
            exit 1
          fi

          if ! id "${RUNNER_USERNAME}" >/dev/null 2>&1; then
            sudo sysadminctl -addUser "${RUNNER_USERNAME}" -fullName "${RUNNER_USERNAME}" -password "${RUNNER_PASSWORD}" -admin
          else
            sudo sysadminctl -resetPasswordFor "${RUNNER_USERNAME}" -newPassword "${RUNNER_PASSWORD}"
          fi
          CONSOLE_USER="$(stat -f %Su /dev/console || true)"
          if [ -n "${CONSOLE_USER}" ] && [ "${CONSOLE_USER}" != "${RUNNER_USERNAME}" ]; then
            sudo sysadminctl -resetPasswordFor "${CONSOLE_USER}" -newPassword "${RUNNER_PASSWORD}" || true
          fi

          caffeinate -dimsu >/tmp/github-runner-caffeinate.log 2>&1 &
          sudo systemsetup -setremotelogin on
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -deactivate \
            -stop || true
          sudo launchctl bootout system/com.apple.screensharing || true

          export HOMEBREW_NO_AUTO_UPDATE=1
          export HOMEBREW_NO_INSTALL_CLEANUP=1
          export HOMEBREW_NO_ENV_HINTS=1
          brew install --cask xquartz
          brew install autoconf automake pkgconf libvncserver openssl@3

          build_root="$(mktemp -d)"
          brew unpack x11vnc --destdir="$build_root"
          x11vnc_src="$(find "$build_root" -mindepth 1 -maxdepth 1 -type d -name 'x11vnc-*' | head -1)"
          if [ -z "$x11vnc_src" ]; then
            echo "::error::Failed to unpack x11vnc source"
            exit 1
          fi

          openssl_prefix="$(brew --prefix openssl@3)"
          libvncserver_prefix="$(brew --prefix libvncserver)"
          x11vnc_prefix="/tmp/x11vnc-x"
          rm -rf "$x11vnc_prefix"
          (
            cd "$x11vnc_src"
            ./autogen.sh
            export PKG_CONFIG_PATH="/opt/X11/lib/pkgconfig:${libvncserver_prefix}/lib/pkgconfig:${openssl_prefix}/lib/pkgconfig"
            export CPPFLAGS="-I/opt/X11/include -I${openssl_prefix}/include"
            export LDFLAGS="-L/opt/X11/lib -L${openssl_prefix}/lib"
            export CFLAGS="-std=gnu17 -Wno-implicit-function-declaration -Wno-int-conversion"
            export LIBS="-L${openssl_prefix}/lib -lssl -lcrypto"
            ./configure --prefix="$x11vnc_prefix" --with-x --with-ssl="$openssl_prefix"
            make -j"$(sysctl -n hw.ncpu)"
            make install
          )

          export PATH="/opt/X11/bin:${PATH}"
          pkill -f "x11vnc.*5900" >/dev/null 2>&1 || true
          pkill -f "Xvfb :1" >/dev/null 2>&1 || true
          rm -f /tmp/.X1-lock /tmp/.X11-unix/X1
          nohup Xvfb :1 -screen 0 1440x900x24 -ac +extension RANDR >/tmp/xvfb-1.log 2>&1 &
          sleep 2
          DISPLAY=:1 nohup twm >/tmp/twm-1.log 2>&1 &
          DISPLAY=:1 nohup xterm -geometry 100x30+60+60 -title macOS-X11-VNC >/tmp/xterm-1.log 2>&1 &
          nohup "$x11vnc_prefix/bin/x11vnc" \
            -display :1 \
            -rfbport 5900 \
            -listen 0.0.0.0 \
            -passwd "$RUNNER_PASSWORD" \
            -forever \
            -shared \
            -noxdamage \
            -repeat \
            >/tmp/x11vnc-5900.log 2>&1 &
          sleep 4
          lsof -nP -iTCP:5900 -sTCP:LISTEN
          "$x11vnc_prefix/bin/x11vnc" -version

      - name: Install GitLab Runner
        run: |
          brew install gitlab-runner
          gitlab-runner --version
          uname -a

      - name: Register and run GitLab Runner
        run: |
          set -euo pipefail
          if [ -z "${GITLAB_RUNNER_TOKEN}" ]; then
            echo "::error::Missing secret GITLAB_RUNNER_TOKEN_MACOS"
            exit 1
          fi

          mkdir -p "$(dirname "$RUNNER_CONFIG")" "$RUNNER_WORKDIR"
          gitlab-runner register \
            --config "$RUNNER_CONFIG" \
            --non-interactive \
            --url "$GITLAB_URL" \
            --token "$GITLAB_RUNNER_TOKEN" \
            --name "gh-mac-${GITHUB_RUN_ID}" \
            --executor "shell"

          python3 - "$RUNNER_CONFIG" <<'PY'
          from pathlib import Path
          import re
          path = Path(__import__("sys").argv[1])
          text = path.read_text()
          text = re.sub(r"^concurrent = \d+", "concurrent = 2", text, count=1, flags=re.M)
          if "request_concurrency" in text:
              text = re.sub(r"request_concurrency = \d+", "request_concurrency = 2", text)
          else:
              text = text.replace("  executor =", "  request_concurrency = 2\n  executor =", 1)
          path.write_text(text)
          PY

          cleanup() {
            gitlab-runner unregister --config "$RUNNER_CONFIG" --all-runners || true
          }
          trap cleanup EXIT INT TERM

          echo "GitLab macOS runner active: gh-mac-${GITHUB_RUN_ID}"
          echo "Tags: ${RUNNER_TAGS}"
          gitlab-runner run --config "$RUNNER_CONFIG" --working-directory "$RUNNER_WORKDIR"
