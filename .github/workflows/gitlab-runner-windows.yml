name: GitLab Runner Windows

on:
  workflow_dispatch:

jobs:
  windows-runner:
    runs-on: windows-2025
    timeout-minutes: 360
    env:
      GITLAB_URL: ${{ vars.GITLAB_URL }}
      GITLAB_RUNNER_TOKEN: ${{ secrets.GITLAB_RUNNER_TOKEN_WINDOWS }}
      LOG_LEVEL: warn
      RUNNER_TAGS: saas-windows-medium-amd64
      RUNNER_USERNAME: ${{ vars.RUNNER_USERNAME }}
      RUNNER_PASSWORD: ${{ secrets.RUNNER_PASSWORD }}
      RUNNER_DIR: C:\gitlab-runner
      RUNNER_CONFIG: C:\gitlab-runner\config.toml

    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-runner
          hostname: gh-win-${{ github.run_id }}

      - name: Configure SSH, RDP, and VNC
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not $env:RUNNER_PASSWORD) {
            Write-Error 'Missing secret RUNNER_PASSWORD'
            exit 1
          }

          $securePass = ConvertTo-SecureString $env:RUNNER_PASSWORD -AsPlainText -Force
          $user = Get-LocalUser -Name $env:RUNNER_USERNAME -ErrorAction SilentlyContinue
          if (-not $user) {
            New-LocalUser -Name $env:RUNNER_USERNAME -Password $securePass -AccountNeverExpires | Out-Null
          } else {
            Set-LocalUser -Name $env:RUNNER_USERNAME -Password $securePass
          }
          Add-LocalGroupMember -Group 'Administrators' -Member $env:RUNNER_USERNAME -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group 'Remote Desktop Users' -Member $env:RUNNER_USERNAME -ErrorAction SilentlyContinue

          $sshCap = Get-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0
          if ($sshCap.State -ne 'Installed') {
            Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0 | Out-Null
          }
          Set-Service -Name sshd -StartupType Automatic
          Start-Service sshd
          New-NetFirewallRule -DisplayName 'SSH-Tailscale' -Direction Inbound -Action Allow -Protocol TCP -LocalPort 22 -ErrorAction SilentlyContinue | Out-Null

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name 'fDenyTSConnections' -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name 'UserAuthentication' -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name 'SecurityLayer' -Value 0 -Force
          New-NetFirewallRule -DisplayName 'RDP-Tailscale' -Direction Inbound -Action Allow -Protocol TCP -LocalPort 3389 -ErrorAction SilentlyContinue | Out-Null
          Restart-Service -Name TermService -Force

          $vncMsi = Join-Path $env:TEMP 'tightvnc.msi'
          Invoke-WebRequest 'https://www.tightvnc.com/download/2.8.85/tightvnc-2.8.85-gpl-setup-64bit.msi' -OutFile $vncMsi
          $vncArgs = @(
            '/i', "`"$vncMsi`"",
            '/quiet', '/norestart',
            'ADDLOCAL=Server',
            'SET_USEVNCAUTHENTICATION=1',
            'VALUE_OF_USEVNCAUTHENTICATION=1',
            'SET_PASSWORD=1',
            "VALUE_OF_PASSWORD=$env:RUNNER_PASSWORD",
            'SET_USECONTROLAUTHENTICATION=1',
            'VALUE_OF_USECONTROLAUTHENTICATION=1',
            'SET_CONTROLPASSWORD=1',
            "VALUE_OF_CONTROLPASSWORD=$env:RUNNER_PASSWORD"
          )
          Start-Process msiexec.exe -ArgumentList $vncArgs -Wait
          Remove-Item $vncMsi -Force
          Start-Service tvnserver -ErrorAction SilentlyContinue
          New-NetFirewallRule -DisplayName 'VNC-Tailscale' -Direction Inbound -Action Allow -Protocol TCP -LocalPort 5900 -ErrorAction SilentlyContinue | Out-Null

      - name: Install GitLab Runner
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force $env:RUNNER_DIR | Out-Null
          Invoke-WebRequest `
            "https://gitlab-runner-downloads.s3.amazonaws.com/latest/binaries/gitlab-runner-windows-amd64.exe" `
            -OutFile "$env:RUNNER_DIR\gitlab-runner.exe"
          & "$env:RUNNER_DIR\gitlab-runner.exe" --version

      - name: Register and run GitLab Runner
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not $env:GITLAB_RUNNER_TOKEN) {
            Write-Error 'Missing secret GITLAB_RUNNER_TOKEN_WINDOWS'
            exit 1
          }

          $runner = "$env:RUNNER_DIR\gitlab-runner.exe"
          New-Item -ItemType Directory -Force "$env:RUNNER_DIR\work" | Out-Null
          $registerArgs = @(
            'register',
            '--config', $env:RUNNER_CONFIG,
            '--non-interactive',
            '--url', $env:GITLAB_URL,
            '--token', $env:GITLAB_RUNNER_TOKEN,
            '--name', "gh-win-$env:GITHUB_RUN_ID",
            '--executor', 'shell',
            '--shell', 'powershell'
          )
          & $runner @registerArgs
          if ($LASTEXITCODE -ne 0) {
            throw "GitLab Runner registration failed with exit code $LASTEXITCODE"
          }

          $config = Get-Content -Raw $env:RUNNER_CONFIG
          $config = $config -replace '(?m)^concurrent = \d+', 'concurrent = 2'
          if ($config -match 'request_concurrency = \d+') {
            $config = $config -replace 'request_concurrency = \d+', 'request_concurrency = 2'
          } else {
            $config = $config -replace '  executor =', "  request_concurrency = 2`n  executor ="
          }
          Set-Content -Path $env:RUNNER_CONFIG -Value $config -NoNewline

          try {
            Write-Host "GitLab Windows runner active: gh-win-$env:GITHUB_RUN_ID"
            Write-Host "Tags: $env:RUNNER_TAGS"
            & $runner run --config $env:RUNNER_CONFIG --working-directory "$env:RUNNER_DIR\work"
            if ($LASTEXITCODE -ne 0) {
              throw "GitLab Runner exited with code $LASTEXITCODE"
            }
          } finally {
            & $runner unregister --config $env:RUNNER_CONFIG --all-runners
          }
