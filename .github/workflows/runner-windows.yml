name: GitLab Runner Windows
# Ephemeral GitLab release runner. Runs one GitLab job then exits.

on:
  workflow_dispatch:
    inputs:
      source:
        description: Dispatch source guard
        required: true
        type: string
      release_tag:
        description: GitLab release tag
        required: false
        type: string
      pipeline_id:
        description: GitLab pipeline ID
        required: false
        type: string

run-name: GitLab Runner Windows ${{ github.event.inputs.release_tag || 'manual' }}

concurrency:
  group: gitlab-runner-windows
  cancel-in-progress: true

jobs:
  runner-windows:
    if: ${{ github.event.inputs.source == 'gitlab-release' && github.event.inputs.pipeline_id != '' }}
    runs-on: windows-2025
    timeout-minutes: 35
    env:
      GITLAB_URL: ${{ vars.GITLAB_URL }}
      GITLAB_RUNNER_TOKEN: ${{ secrets.GITLAB_RUNNER_TOKEN_WINDOWS }}
      LOG_LEVEL: warn
      RUNNER_DIR: C:\gitlab-runner
      RUNNER_CONFIG: C:\gitlab-runner\config.toml
      GROKAUTO_CACHE_DIR: ${{ github.workspace }}\.grokauto-cache
      GROKAUTO_SOURCE_DIR: ${{ github.workspace }}\grokauto-src
      PNPM_STORE_DIR: ${{ github.workspace }}\.grokauto-cache\pnpm-store
      CARGO_HOME: ${{ github.workspace }}\.grokauto-cache\cargo-home
      ELECTRON_CACHE: ${{ github.workspace }}\.grokauto-cache\electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}\.grokauto-cache\electron-builder

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Restore build caches
        uses: actions/cache@v4
        with:
          path: |
            .grokauto-cache\pnpm-store
            .grokauto-cache\cargo-home\registry
            .grokauto-cache\cargo-home\git
            .grokauto-cache\electron
            .grokauto-cache\electron-builder
            .grokauto-cache\gitlab-runner\gitlab-runner.exe
            grokauto-src\native\target
          key: grokauto-windows-release-v1

      - name: Prepare cached toolchain dirs
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($dir in @(
            $env:GROKAUTO_CACHE_DIR,
            $env:GROKAUTO_SOURCE_DIR,
            $env:PNPM_STORE_DIR,
            $env:CARGO_HOME,
            $env:ELECTRON_CACHE,
            $env:ELECTRON_BUILDER_CACHE
          )) {
            New-Item -ItemType Directory -Force $dir | Out-Null
          }
          node --version
          if (Get-Command rustc -ErrorAction SilentlyContinue) {
            rustc --version
            cargo --version
          } else {
            Write-Host 'Rust is not preinstalled; GitLab job will install rustup.'
          }

      - name: Install GitLab Runner
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force $env:RUNNER_DIR | Out-Null
          $cachedRunner = Join-Path $env:GROKAUTO_CACHE_DIR 'gitlab-runner\gitlab-runner.exe'
          New-Item -ItemType Directory -Force (Split-Path -Parent $cachedRunner) | Out-Null
          if (-not (Test-Path -LiteralPath $cachedRunner)) {
            Invoke-WebRequest `
              "https://gitlab-runner-downloads.s3.amazonaws.com/latest/binaries/gitlab-runner-windows-amd64.exe" `
              -OutFile $cachedRunner
          }
          Copy-Item -LiteralPath $cachedRunner -Destination "$env:RUNNER_DIR\gitlab-runner.exe" -Force
          & "$env:RUNNER_DIR\gitlab-runner.exe" --version

      - name: Register and run one GitLab job
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not $env:GITLAB_URL) {
            throw 'Missing variable GITLAB_URL'
          }
          if (-not $env:GITLAB_RUNNER_TOKEN) {
            throw 'Missing secret GITLAB_RUNNER_TOKEN_WINDOWS'
          }

          $runner = "$env:RUNNER_DIR\gitlab-runner.exe"
          $runnerName = "gh-windows-$env:GITHUB_RUN_ID"
          New-Item -ItemType Directory -Force "$env:RUNNER_DIR\work" | Out-Null
          $registerArgs = @(
            'register',
            '--config', $env:RUNNER_CONFIG,
            '--non-interactive',
            '--url', $env:GITLAB_URL,
            '--token', $env:GITLAB_RUNNER_TOKEN,
            '--name', $runnerName,
            '--executor', 'shell',
            '--shell', 'powershell'
          )
          & $runner @registerArgs
          if ($LASTEXITCODE -ne 0) {
            throw "GitLab Runner registration failed with exit code $LASTEXITCODE"
          }

          $config = Get-Content -Raw $env:RUNNER_CONFIG
          $config = $config -replace '(?m)^concurrent = \d+', 'concurrent = 1'
          if ($config -match 'request_concurrency = \d+') {
            $config = $config -replace 'request_concurrency = \d+', 'request_concurrency = 1'
          } else {
            $config = $config -replace '  executor =', "  request_concurrency = 1`n  executor ="
          }
          Set-Content -Path $env:RUNNER_CONFIG -Value $config -NoNewline

          try {
            & $runner run-single `
              --config $env:RUNNER_CONFIG `
              -r $runnerName `
              --max-builds 1 `
              --wait-timeout 600
            if ($LASTEXITCODE -ne 0) {
              throw "GitLab Runner exited with code $LASTEXITCODE"
            }
          } finally {
            & $runner unregister --config $env:RUNNER_CONFIG --all-runners
          }
