name: GitHub Native Linux Build

on:
  workflow_dispatch:
    inputs:
      source:
        description: Dispatch source guard
        required: true
        type: string
      release_tag:
        description: GitLab release tag
        required: true
        type: string
      pipeline_id:
        description: GitLab pipeline ID
        required: true
        type: string

run-name: "Linux Build ${{ github.event.inputs.release_tag || 'manual' }} #${{ github.event.inputs.pipeline_id || 'manual' }}"

concurrency:
  group: github-native-linux-${{ github.event.inputs.release_tag || github.run_id }}
  cancel-in-progress: true

jobs:
  build-linux:
    if: ${{ github.event.inputs.source == 'gitlab-release' && github.event.inputs.pipeline_id != '' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CI: "true"
      NODE_ENV: production
      PNPM_VERSION: 11.5.2
      EG_TOOLS_REQUIRE_SPKI_PINS: "1"
      TOOL_REQUIRE_SIGNED_RELEASE_MANIFEST: "1"
      EG_TOOLS_API_BASE_URL: https://tool-api.snailtool.io.vn
      EG_TOOLS_WEB_BASE_URL: https://snailtool.io.vn
      EG_TOOLS_API_SPKI_PINS: ElGeQINyN61ot50DuLGy9fPH0FQPHNTdEWsat7zo7Ww=
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      CARGO_HOME: ${{ github.workspace }}/.cache/cargo
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
      MANIFEST_PRIVATE_KEY_PEM: ${{ secrets.MANIFEST_PRIVATE_KEY_PEM }}
      RELEASE_PRIVATE_KEY_PEM: ${{ secrets.RELEASE_PRIVATE_KEY_PEM }}
      LEASE_PRIVATE_KEY_PEM: ${{ secrets.LEASE_PRIVATE_KEY_PEM }}
      ENCRYPTION_PRIVATE_KEY_PEM: ${{ secrets.ENCRYPTION_PRIVATE_KEY_PEM }}
      MANIFEST_PUBLIC_KEY_PEM: ${{ secrets.MANIFEST_PUBLIC_KEY_PEM }}
      RELEASE_PUBLIC_KEY_PEM: ${{ secrets.RELEASE_PUBLIC_KEY_PEM }}
      LEASE_PUBLIC_KEY_PEM: ${{ secrets.LEASE_PUBLIC_KEY_PEM }}
      ENCRYPTION_PUBLIC_KEY_PEM: ${{ secrets.ENCRYPTION_PUBLIC_KEY_PEM }}

    steps:
      - name: Validate inputs
        run: |
          set -euo pipefail
          GITLAB_TOKEN_CLEAN="$(printf '%s' "${GITLAB_TOKEN}" | tr -d '\r\n[:space:]')"
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::Missing secret GH_TOKEN"
            exit 1
          fi
          if [ -z "${GITLAB_TOKEN_CLEAN}" ]; then
            echo "::error::Missing secret GITLAB_TOKEN"
            exit 1
          fi

      - name: Install system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            libgtk-3-0 libx11-xcb1 libxcb-dri3-0 libxss1 \
            libpango-1.0-0 libatk1.0-0 libatk-bridge2.0-0 \
            libgdk-pixbuf2.0-0 libglib2.0-0 libcairo2 \
            libnss3 libnspr4 libasound2t64 libgbm1 xvfb xauth unzip curl git ca-certificates

      - name: Checkout GitLab source
        run: |
          set -euo pipefail
          GITLAB_TOKEN_CLEAN="$(printf '%s' "${GITLAB_TOKEN}" | tr -d '\r\n[:space:]')"
          git clone --depth 1 --branch "${{ github.event.inputs.release_tag }}" \
            "https://oauth2:${GITLAB_TOKEN_CLEAN}@gitlab.com/dongochoan97/grokauto.git" source

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Setup pnpm
        working-directory: source
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@${PNPM_VERSION} --activate
          pnpm config set store-dir "$GITHUB_WORKSPACE/.cache/pnpm-store"

      - name: Restore build caches
        uses: actions/cache@v5.0.5
        with:
          path: |
            .cache/pnpm-store
            .cache/cargo
            .cache/electron
            .cache/electron-builder
            source/native/target
          key: grokauto-linux-${{ runner.os }}-${{ hashFiles('source/pnpm-lock.yaml', 'source/native/Cargo.lock') }}
          restore-keys: |
            grokauto-linux-${{ runner.os }}-

      - name: Build Linux release
        working-directory: source
        run: |
          set -euo pipefail
          RELEASE_VERSION="${{ github.event.inputs.release_tag }}"
          RELEASE_VERSION="${RELEASE_VERSION#v}"
          rm -rf node_modules dist release
          pnpm install --frozen-lockfile --prefer-offline
          node scripts/restore-build-keys.js
          pnpm setup:keys
          node scripts/build.js linux --version "$RELEASE_VERSION" --release-artifact

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: grokauto-linux-${{ github.event.inputs.pipeline_id }}
          if-no-files-found: error
          retention-days: 14
          path: |
            source/release/GrokAutomation-*-amd64.deb
            source/release/latest-linux.yml
